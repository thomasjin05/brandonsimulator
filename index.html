<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Brandon Simulator</title>
    <link rel="stylesheet" href="./styles.css?v=31">
  </head>
  <body>
    <main class="game-shell">
      <section class="start-screen" id="startScreen" aria-labelledby="title">
        <div class="low-poly-sun"></div>
        <h1 id="title">brandon simulator</h1>
        <button class="primary-button" id="startButton" type="button">start</button>
      </section>

      <section class="game-screen is-hidden" id="gameScreen" aria-label="Brandon Simulator game">
        <div class="sky">
          <div class="cloud c1"></div>
          <div class="cloud c2"></div>
          <div class="ridge ridge-back"></div>
          <div class="ridge ridge-front"></div>
        </div>

        <div class="plane" id="plane">
          <div class="grid-line g1"></div>
          <div class="grid-line g2"></div>
          <div class="grid-line g3"></div>
          <div class="shadow" id="shadow"></div>

          <button class="brandon" id="brandon" type="button" aria-label="Click Brandon">
            <span class="dance-arm nose-arm"></span>
            <img src="./assets/brandon-cutout.png" alt="Brandon">
            <span class="dance-arm wave-arm"></span>
          </button>
        </div>

        <div class="hud">
          <div class="tools">
            <button class="tool-button is-selected" id="handButton" type="button" title="Hand tool" aria-label="Hand tool">
              <span class="hand-icon"></span>
            </button>
            <button class="tool-button" id="targetButton" type="button" title="Target tool" aria-label="Target tool">
              <span class="target-icon"></span>
            </button>
            <button class="tool-button" id="tomatoButton" type="button" title="Throw tomato" aria-label="Throw tomato">
              <span class="tomato-icon"></span>
            </button>
            <button class="tool-button" id="resetButton" type="button" title="Reset Brandons" aria-label="Reset Brandons">
              <span class="reset-icon"></span>
            </button>
          </div>
          <div class="status" id="status">tap Brandon or throw a tomato</div>
        </div>
      </section>
    </main>

    <span class="screen-crosshair is-hidden" id="crosshair" aria-hidden="true"></span>
    <audio id="barkPlayer" preload="auto"></audio>
    <script src="./game.js?v=31"></script>
  </body>
</html>
